play.evolutions.enabled=true
play.evolutions.autoApply=true
play.ebean.generateEvolutionsScripts=true

db.default.driver=com.mysql.cj.jdbc.Driver

db.default.url="jdbc:mysql://localhost:3306/splitwise"
db.default.username="YOUR_DB_USERNAME"
db.default.password="YOUR_DB_PASSWORD"

ebean.default=["models.*"]

play.filters.disabled+=play.filters.csrf.CSRFFilter
play.filters.enabled+=play.filters.cors.CORSFilter

play.filters.cors {
  allowedOrigins = ["http://localhost:5173"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Authorization"]
  supportsCredentials = true
}

play.http.errorHandler = "controllers.ErrorHandler"

# Load local configuration overrides if the file exists
include "application.local.conf"
